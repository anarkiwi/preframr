name: docker-release
# Publishes images to Docker Hub on push to main (an actual release) and on
# v* tags; build validation on branches/PRs is handled by docker.yml. Each
# image is tagged :latest and :${VERSION} (read from the VERSION file).
on:
  push:
    branches: [main]
    tags: ['v*']
jobs:
  docker-cuda:
    runs-on: ubuntu-latest
    environment:
      name: "release"
    if: github.repository == 'anarkiwi/preframr'
    steps:
    - uses: actions/checkout@v6
    - name: Read version
      id: ver
      run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile
        push: true
        tags: |
          anarkiwi/preframr:latest
          anarkiwi/preframr:${{ steps.ver.outputs.v }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
  docker-predict:
    runs-on: ubuntu-latest
    environment:
      name: "release"
    if: github.repository == 'anarkiwi/preframr'
    steps:
    - uses: actions/checkout@v6
    - name: Read version
      id: ver
      run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile.predict
        push: true
        tags: |
          anarkiwi/preframr-predict:latest
          anarkiwi/preframr-predict:${{ steps.ver.outputs.v }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
  docker-xpu:
    runs-on: ubuntu-latest
    environment:
      name: "release"
    if: github.repository == 'anarkiwi/preframr'
    steps:
    - uses: actions/checkout@v6
    - name: Read version
      id: ver
      run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile.predict
        push: true
        tags: |
          anarkiwi/preframr-xpu:latest
          anarkiwi/preframr-xpu:${{ steps.ver.outputs.v }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
            BASE=anarkiwi/pytorch-xpu:v2.12.0
  docker-jetson:
    runs-on: ubuntu-24.04-arm
    environment:
      name: "release"
    if: github.repository == 'anarkiwi/preframr'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Read version
        id: ver
        run: echo "v=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.predict
          platforms: linux/arm64
          push: true
          tags: |
            anarkiwi/preframr-jetson:latest
            anarkiwi/preframr-jetson:${{ steps.ver.outputs.v }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
              BASE=anarkiwi/jetson-triton:v2.12.0
              REQ=predict-jetson-requirements.txt
